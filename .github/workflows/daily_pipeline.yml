name: Daily Job Market Pipeline

on:
  schedule:
    - cron: '0 3 * * *'  # Runs daily at 3:00 AM UTC (8:30 AM IST)
  workflow_dispatch:  # Allows manual trigger from GitHub UI too

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas python-dotenv sqlalchemy psycopg2-binary

      - name: Run Extract
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python scripts/extract_jobs.py

      - name: Run Transform
        run: python scripts/transform_jobs.py

      - name: Run Load
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/load_jobs.py

      - name: Commit and push data files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Automated data update $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push